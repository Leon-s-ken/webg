<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Cookie Creator</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .success { color: green; }
        .error { color: red; }
        input { margin: 5px 0; padding: 5px; }
        button { padding: 6px 12px; margin-top: 10px; }
        .cookie-box { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<h2>Enter Student Details</h2>

<div id="message"></div>

<form id="studentForm">
    Student ID: <input type="text" id="studentId" required /><br/>
    Programme:  <input type="text" id="programme" required /><br/>
    <button type="button" onclick="createCookies()">Create Cookies</button>
</form>

<div class="cookie-box">
    <h3>Current Cookies (if any):</h3>
    <div id="cookieDisplay"></div>
</div>

<script>
    // Function to set a cookie (expires in 1 day)
    function setCookie(name, value, days = 1) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        const expires = "expires=" + date.toUTCString();
        document.cookie = name + "=" + value + ";" + expires + ";path=/";
    }

    // Function to get all cookies as an object
    function getCookies() {
        const cookies = document.cookie.split('; ');
        const cookieObj = {};
        for (let cookie of cookies) {
            const [name, value] = cookie.split('=');
            if (name && value) cookieObj[name] = decodeURIComponent(value);
        }
        return cookieObj;
    }

    // Display current cookies on page load
    function displayCookies() {
        const cookies = getCookies();
        const displayDiv = document.getElementById("cookieDisplay");
        if (Object.keys(cookies).length === 0) {
            displayDiv.innerHTML = "<i>No cookies set yet.</i>";
        } else {
            let html = "<ul>";
            for (let [name, value] of Object.entries(cookies)) {
                if (name === "studentId" || name === "programme") {
                    html += `<li><strong>${name}</strong> = ${value}</li>`;
                }
            }
            html += "</ul>";
            displayDiv.innerHTML = html;
        }
    }

    // Main function to create cookies when button is clicked
    function createCookies() {
        const studentId = document.getElementById("studentId").value.trim();
        const programme = document.getElementById("programme").value.trim();
        const messageDiv = document.getElementById("message");

        if (studentId === "" || programme === "") {
            messageDiv.innerHTML = '<span class="error">Both fields are required!</span>';
            return;
        }

        // Create two cookies
        setCookie("studentId", studentId);
        setCookie("programme", programme);

        messageDiv.innerHTML = '<span class="success">Cookies created successfully for Student ID: ' + 
                               escapeHtml(studentId) + ' and Programme: ' + escapeHtml(programme) + '</span>';

        // Clear input fields (optional)
        document.getElementById("studentId").value = "";
        document.getElementById("programme").value = "";

        // Refresh displayed cookies
        displayCookies();
    }

    // Simple escape to prevent XSS (just for display)
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Show cookies when page loads
    window.onload = displayCookies;
</script>

</body>
</html>
