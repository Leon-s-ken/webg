<!DOCTYPE html>
<html>
<head>
    <title>Multiplication of Alpha and Beta</title>
</head>
<body>
    <h2>Enter values for Alpha and Beta</h2>
    <form onsubmit="event.preventDefault(); multiply();">
        Alpha: <input type="number" id="alpha" required/><br/><br/>
        Beta:  <input type="number" id="beta" required/><br/><br/>
        <input type="submit" value="Multiply"/>
    </form>
    <div id="result"></div>

    <script>
        function multiply() {
            let alpha = parseFloat(document.getElementById('alpha').value);
            let beta = parseFloat(document.getElementById('beta').value);
            let result = alpha * beta;
            document.getElementById('result').innerHTML = `
                <hr/>
                <h3>Results:</h3>
                Alpha = ${alpha}<br/>
                Beta = ${beta}<br/>
                <strong>Alpha × Beta = ${result}</strong>
            `;
        }
    </script>
</body>
</html>
